<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linguist Pro - Task 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-card">
    <!-- Header -->
    <header>
        <h1>Linguist Pro</h1>
        <p>Learn a new language daily</p>
    </header>

    <!-- Navigation Tabs -->
    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'learn-tab')">Daily Lesson</button>
        <button class="tab-btn" onclick="openTab(event, 'quiz-tab')">Practice Quiz</button>
    </nav>

    <!-- Content Sections -->
    <main class="app-content">
        
        <!-- Section 1: Learning / Flashcards -->
        <section id="learn-tab" class="tab-content active">
            <div class="category-tags">
                <span class="tag">Vocabulary</span>
                <span class="tag">Essentials</span>
            </div>

            <div class="flip-card" onclick="this.classList.toggle('is-flipped')">
                <div class="card-inner">
                    <div class="card-front">
                        <small>Spanish Word</small>
                        <h2 id="word-text">Hola</h2>
                        <button class="speak-btn" onclick="event.stopPropagation(); playSound()">🔊 Listen</button>
                    </div>
                    <div class="card-back">
                        <small>English Translation</small>
                        <h2 id="translation-text">Hello</h2>
                    </div>
                </div>
            </div>
            <button class="next-btn" onclick="loadNextWord()">Next Word →</button>
        </section>

        <!-- Section 2: Quiz -->
        <section id="quiz-tab" class="tab-content">
            <div class="quiz-container">
                <h3>What is the meaning of: <br><span id="quiz-q-word">Gracias</span>?</h3>
                <div class="options" id="quiz-options">
                    <!-- Options will be generated by JS -->
                </div>
                <div id="quiz-feedback"></div>
            </div>
        </section>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
